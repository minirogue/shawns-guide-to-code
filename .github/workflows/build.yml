name: build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: mkdocs build --clean --strict
